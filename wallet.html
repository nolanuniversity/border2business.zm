<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wallet | Trust ZedFund</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
:root {
  --tzf-bg-dark: #0a1f1c;
  --tzf-green-main: #0f6f61;
  --tzf-green-light: #1aa08a;
  --tzf-accent-gold: #f1e17b;
  --tzf-text-light: #e6f4f1;
  --tzf-text-muted: #9bbfba;
  --tzf-white: #ffffff;
}

/* PAGE */
body {
  font-family: "Segoe UI", sans-serif;
  background: var(--tzf-bg-dark);
  margin: 0;
  padding: 0;
  color: var(--tzf-text-light);
}

/* CONTAINER */
.wallet-container {
  max-width: 520px;
  margin: auto;
  padding: 28px 18px 60px;
}

/* HEADERS */
h2 {
  text-align: center;
  margin-bottom: 6px;
  color: var(--tzf-white);
}

.subtext {
  text-align: center;
  color: var(--tzf-text-muted);
  margin-bottom: 24px;
}

/* CARDS */
.card {
  background: linear-gradient(
    180deg,
    rgba(15,111,97,0.85),
    rgba(10,31,28,0.9)
  );
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 18px;
  border: 1px solid rgba(26,160,138,0.25);
  box-shadow: 0 12px 28px rgba(0,0,0,0.35);
}

/* AMOUNTS */
.amount {
  font-size: 24px;
  font-weight: 700;
  color: var(--tzf-accent-gold);
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(26,160,138,0.4);
  margin-top: 12px;
  font-size: 15px;
  background: rgba(255,255,255,0.95);
  color: #111;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 14px;
  font-weight: 600;
}

.btn-primary {
  background: linear-gradient(135deg, #1aa08a, #0f6f61);
  color: white;
}

/* PROVIDERS */
.provider-buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.btn-airtel {
  background: #e60000;
  color: #fff;
}

.btn-mtn {
  background: #ffcc00;
  color: #1f1f1f;
}

/* UTIL */
.hidden {
  display: none;
}

.center {
  text-align: center;
}

.list-item {
  padding: 10px 0;
  border-bottom: 1px dashed rgba(255,255,255,0.15);
  font-size: 14px;
  color: var(--tzf-text-muted);
}

/* WhatsApp button */
.deposit-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 14px;
  margin-top: 15px;
  background: #25D366;
  color: white;
  font-weight: bold;
  text-decoration: none;
  border-radius: 14px;
  font-size: 16px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}
  </style>
</head>

<body>

<div class="wallet-container">

  <h2>Payments Section</h2>
  <div class="subtext">
    Make deposits for your needs: Masterclass, Coaching, or Expert Mentorship
  </div>

  <!-- MASTERCLASSES>
  <div class="card">
    <h3>Deposit Mobile Money</h3>
    <div class="amount" id="depositTomake">ZMK 20.00</div>
  </div>

  <div class="card">
    <h3>Coaching Sessions</h3>
    <div class="amount" id="makeDeposit from">ZMK 30.00</div>
  </div>

  <!-- DEPOSIT FORM -->
  <div class="card">
    <h3>Deposit Cash</h3>

    <input type="number" id="depositAmount" placeholder="Enter amount in ZMK"/>

    <button class="btn-primary" id="chooseProviderBtn">
      Continue
    </button>

    <!-- PROVIDER -->
    <div id="providerSection" class="hidden center">
      <p><strong>Select Provider</strong></p>

      <div class="provider-buttons">
        <button class="btn-airtel" id="airtelBtn">Airtel Money</button>
        <button class="btn-mtn" id="mtnBtn">MTN Mobile Money</button>
      </div>
    </div>

    <!-- PAYMENT DETAILS -->
    <div id="paymentDetails" class="hidden">
      <h4 id="selectedProviderTitle"></h4>

      <p><strong>Send To:</strong></p>
      <p id="payToNumber"></p>

      <p><strong>Amount:</strong></p>
      <p id="payAmount"></p>

      <input type="text" id="senderNumber" placeholder="Your Number"/>
      <input type="text" id="transactionId" placeholder="Transaction ID"/>

      <button class="btn-primary" id="confirmDepositBtn">
        Confirm Deposit
      </button>
    </div>

  </div>

  <!-- ACTIVE DEPOSITS -->
  <div class="card">
    <h3>Active Deposits</h3>
    <div id="activeDepositsList">
      <p class="subtext">No active deposits yet</p>
    </div>
  </div>

  <!-- TRANSACTION HISTORY -->
  <div class="card">
    <h3>Transaction History</h3>
    <div id="transactionHistoryList">
      <p class="subtext">No transactions yet</p>
    </div>
  </div>

  <!-- ✅ WHATSAPP BUTTON (NOW CORRECT POSITION) -->
  <button id="sendWhatsAppBtn" class="deposit-btn" style="display:none;">
    💬 Send Proof on WhatsApp
  </button>

</div>

<script type="module" src="wallet.js"></script>

</body>
</html>
